<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoniaEmu Demo</title>

    <link rel="stylesheet" href="static/css/style.css" />
    <style>
      body {
        flex-direction: column;
        gap: 0;
        padding: 24px;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
        font-weight: 300;
        color: #e0e0e0;
      }

      .card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        padding: 40px 36px 36px;
        max-width: 420px;
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
        animation: fadein 0.4s ease both;
      }

      @keyframes fadein {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .label {
        font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
        font-size: 11px;
        letter-spacing: 0.15em;
        color: #666;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      h1 {
        font-size: 26px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 8px;
      }

      .warning {
        background: rgba(255, 100, 100, 0.06);
        border: 1px solid rgba(255, 100, 100, 0.25);
        border-radius: 4px;
        padding: 13px 15px;
        display: flex;
        gap: 11px;
        align-items: flex-start;
        animation: fadein 0.4s 0.1s ease both;
      }

      .notice {
        background: rgba(200, 200, 200, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        padding: 13px 15px;
        display: flex;
        gap: 11px;
        align-items: flex-start;
        animation: fadein 0.4s 0.2s ease both;
      }

      .icon {
        font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
        font-size: 12px;
        color: #888;
        flex-shrink: 0;
        margin-top: 1px;
      }

      .warn-text {
        font-size: 13px;
        line-height: 1.6;
        color: #bbb;
      }
      .warn-text strong {
        color: #ddd;
        font-weight: 600;
      }

      .cta {
        display: block;
        text-align: center;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        color: #fff;
        font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
        font-size: 13px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        text-decoration: none;
        padding: 13px 20px;
        border-radius: 4px;
        margin-top: 4px;
        transition: background 0.15s;
        animation: fadein 0.4s 0.3s ease both;
      }

      .cta:hover {
        background: rgba(255, 255, 255, 0.13);
      }
      .cta:active {
        background: rgba(255, 255, 255, 0.04);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="label">Gamepad Emulator // Preview</p>
      <h1>SoniaEmu Demo</h1>

      <div class="warning">
        <span class="icon">!</span>
        <p class="warn-text">
          <strong>Non-functional demo.</strong> No inputs are sent anywhere —
          joysticks, triggers, and buttons<br />Layout might look weird on big
          screens!!
        </p>
      </div>

      <div class="notice">
        <span class="icon">⌦</span>
        <p class="warn-text">
          <strong>Mobile only.</strong> Designed for touchscreens. Desktop
          interaction won't work. Open on mobile.
        </p>
      </div>

      <a href="demo.html" class="cta">Open Demo →</a>
    </div>
  </body>
</html>
