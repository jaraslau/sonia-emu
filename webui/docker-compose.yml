version: '3.8'

services:
  app:
    build: .
    command: --socket ${CONTAINER_SOCKET_PATH:-/app/socket.sock}
    volumes:
      - ${HOST_SOCKET_PATH}:${CONTAINER_SOCKET_PATH:-/app/socket.sock}
    environment:
      - SOCKET_PATH=${CONTAINER_SOCKET_PATH:-/app/socket.sock}
    ports:
      - "${HOST_PORT:-5000}:5000"